<!DOCTYPE html>
<html>
<head>
    <title>Login - Student Course Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h1>Student Course Planner</h1>
        <p>Log in with your account.</p>

        <input id="emailInput" type="email" class="text-input" placeholder="Email">
        <input id="passwordInput" type="password" class="text-input" placeholder="Password">

        <button id="loginBtn" class="black-btn">Log In</button>
        <a class="auth-link" href="signup.html">Need an account? Sign Up</a>
    </div>

    <div id="toastMessage" class="toast hidden"></div>

    <script src="auth.js"></script>
</body>
</html>
