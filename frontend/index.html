<!DOCTYPE html>
<html>
<head>
    <title>Student Course Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- initial login screen with a registration option -->
    <div id="authScreen" style="display:none; text-align:center; padding:40px;">
        <h1>Student Course Planner</h1>
        <div id="loginForm" style="max-width:300px; margin:auto;">
            <h2>Login</h2>
            <input type="email" id="loginEmail" placeholder="Email" style="width:100%; padding:8px; margin:8px 0;">
            <input type="password" id="loginPassword" placeholder="Password" style="width:100%; padding:8px; margin:8px 0;">
            <button onclick="handleLogin()" class="black-btn" style="width:100%; margin:8px 0;">Login</button>
            <p><button onclick="toggleAuthForm()" style="background:none; border:none; color:blue; cursor:pointer;">Create account</button></p>
        </div>
        <div id="registerForm" style="display:none; max-width:300px; margin:auto;">
            <h2>Register</h2>
            <input type="email" id="regEmail" placeholder="Email" style="width:100%; padding:8px; margin:8px 0;">
            <input type="password" id="regPassword" placeholder="Password" style="width:100%; padding:8px; margin:8px 0;">
            <input type="password" id="regPasswordConfirm" placeholder="Confirm Password" style="width:100%; padding:8px; margin:8px 0;">
            <button onclick="handleRegister()" class="black-btn" style="width:100%; margin:8px 0;">Register</button>
            <p><button onclick="toggleAuthForm()" style="background:none; border:none; color:blue; cursor:pointer;">Back to login</button></p>
        </div>
        <div id="authError" style="color:red; margin-top:10px;"></div>
    </div>

    <div id="mainApp" style="display:none;">

    <!-- top bar design for profile, logouts, and the adding a new term button -->
    <div class="header">
        <button onclick="showTermModal()" class="black-btn">+ Add New Term</button>
        <div>
            <span id="userEmail" style="margin-right:10px;"></span>
            <button onclick="handleLogout()" class="white-btn">Logout</button>
        </div>
    </div>

    <!-- complete placeholder data for the dashboard, currently hard-coded -->
    <div class="dashboard">
        
        <div class="term-box">
            <h3>Fall 2025</h3>
            
            <div class="course-box">
                <div class="course-top-row">
                    <b>CP476</b>
                    <span onclick="toggleCourseStatus(this)" class="badge-black course-status-toggle">Completed</span>
                </div>
                <p class="course-name">Internet Computing</p>
                <button onclick="deleteCourse(this)" class="delete-course-btn">Delete Course</button>
            </div>

            <div class="course-box">
                <div class="course-top-row">
                    <b>CP372</b>
                    <span onclick="toggleCourseStatus(this)" class="badge-black course-status-toggle">Completed</span>
                </div>
                <p class="course-name">Computer Networks</p>
                <button onclick="deleteCourse(this)" class="delete-course-btn">Delete Course</button>
            </div>

            <div class="term-actions">
                <button onclick="showCourseModal(this)" class="add-course-btn">+ Add Course</button>
                <button onclick="deleteTerm(this)" class="delete-term-btn">Delete</button>
            </div>
        </div>

        <div class="term-box">
            <h3>Winter 2026</h3>
            
            <div class="course-box">
                <div class="course-top-row">
                    <b>CP468</b>
                    <span onclick="toggleCourseStatus(this)" class="badge-white course-status-toggle">Planned</span>
                </div>
                <p class="course-name">Artificial Intelligence</p>
                <button onclick="deleteCourse(this)" class="delete-course-btn">Delete Course</button>
            </div>

            <div class="term-actions">
                <button onclick="showCourseModal(this)" class="add-course-btn">+ Add Course</button>
                <button onclick="deleteTerm(this)" class="delete-term-btn">Delete</button>
            </div>
        </div>

    </div>

    <!-- new term popup box design -->
    <div id="termModal" class="modal-background">
        <div class="modal-box">
            <h2>Create New Term</h2>
            <hr>
            
            <p>Semester</p>
            <select id="termSemesterInput" class="text-input">
                <option>Fall</option>
                <option>Winter</option>
                <option>Spring</option>
            </select>

            <p>Year</p>
            <input id="termYearInput" type="text" class="text-input" placeholder="e.g., 2026">

            <br><br>
            <button onclick="saveTermFromModal()" class="black-btn">Create</button>
        </div>
    </div>

    <!-- courses pop-up box design -->
    <div id="courseModal" class="modal-background">
        <div class="modal-box">
            <h2>Add New Course</h2>
            <hr>
            
            <p>Course Code</p>
            <input id="courseCodeInput" type="text" class="text-input" placeholder="e.g., CP476">

            <p>Course Title</p>
            <input id="courseTitleInput" type="text" class="text-input" placeholder="e.g., Internet Computing">

            <p>Credit Weight</p>
            <input id="courseCreditInput" type="text" class="text-input" placeholder="e.g., 0.5">

            <p>Status</p>
            <select id="courseStatusInput" class="text-input">
                <option>Planned</option>
                <option>Completed</option>
            </select>

            <br><br>
            <button onclick="hideCourseModal()" class="white-btn">Cancel</button>
            <button onclick="saveCourseFromModal()" class="black-btn" style="float: right;">Save Course</button>
        </div>
    </div>

    </div>

    <!-- temporary script for the buttons -->
    <script src="script.js"></script>
</body>
</html>
