<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Student Course Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h1>Student Course Planner</h1>
        <p>Create your account to start planning courses.</p>

        <input id="emailInput" type="email" class="text-input" placeholder="Email">
        <input id="passwordInput" type="password" class="text-input" placeholder="Password">

        <button id="signupBtn" class="black-btn">Sign Up</button>
        <a class="auth-link" href="login.html">Already have an account? Log In</a>
    </div>

    <div id="toastMessage" class="toast hidden"></div>

    <script src="auth.js"></script>
</body>
</html>
